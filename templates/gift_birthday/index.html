<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday — GiftLove</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="grain-overlay"></div>
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>
    <canvas id="confetti-canvas"></canvas>

    <section id="screen-gift" class="screen active">
        <div class="gift-scene">
            <p class="overline" id="gift-overline">Birthday Surprise</p>
            <h1 class="gift-title">เซอร์ไพรส์วันเกิด<br>สำหรับ <span id="gift-recipient">คุณ</span></h1>
            <div class="cake-scene" id="cake-scene" role="button" tabindex="0">
                <div class="cake">
                    <div class="cake-top"></div>
                    <div class="cake-middle"></div>
                    <div class="cake-bottom"></div>
                    <div class="candle">
                        <div class="flame" id="flame"></div>
                    </div>
                </div>
                <div class="balloons">
                    <div class="balloon b1"></div>
                    <div class="balloon b2"></div>
                    <div class="balloon b3"></div>
                </div>
            </div>
            <p class="gift-hint">แตะเพื่อเป่าเทียนและเปิดของขวัญ</p>
        </div>
    </section>

    <section id="screen-message" class="screen">
        <div class="message-scene">
            <p class="overline" id="msg-occasion">Happy Birthday</p>
            <div class="age-badge" id="age-badge" hidden></div>
            <h2 class="message-headline">
                <span id="msg-headline">สุขสันต์วันเกิด</span><br>
                <em id="msg-accent">ขอให้มีความสุขมากๆ นะ</em>
            </h2>
            <div class="message-card">
                <p id="msg-body" class="message-body"></p>
                <p class="message-sender">— <span id="msg-sender"></span></p>
            </div>
            <button class="btn-luxury" id="btn-to-gallery">ดูความทรงจำ</button>
        </div>
    </section>

    <section id="screen-gallery" class="screen">
        <div class="gallery-scene">
            <p class="overline">Birthday Memories</p>
            <h2 class="gallery-title">ช่วงเวลา<br><em>สุดพิเศษ</em></h2>
            <div class="gallery-grid" id="gallery-grid"></div>
            <div class="gallery-nav">
                <button class="btn-luxury" id="btn-prev-photo">←</button>
                <span id="photo-counter">1 / 1</span>
                <button class="btn-luxury" id="btn-next-photo">→</button>
            </div>
            <button class="btn-luxury" id="btn-to-finale" style="margin-top:32px">ต่อไป</button>
        </div>
    </section>

    <section id="screen-finale" class="screen">
        <div class="finale-scene">
            <div class="finale-cake">🎂</div>
            <h2 class="finale-title">HAPPY BIRTHDAY!</h2>
            <p class="finale-sub" id="finale-text"></p>
            <div id="video-container" class="video-container" hidden></div>
            <button class="btn-music" id="btn-music" hidden><span id="music-icon">♪</span> เล่นเพลง</button>
        </div>
    </section>

    <audio id="bg-music" loop></audio>
    <script src="gift-data.js"></script>
    <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise — GiftLove</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="grain-overlay"></div>
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>

    <section id="screen-gift" class="screen active">
        <div class="gift-scene">
            <p class="overline" id="gift-overline">Mystery Awaits</p>
            <h1 class="gift-title">มีบางอย่าง<br>รอ <span id="gift-recipient">คุณ</span> อยู่</h1>
            <div class="envelope-scene" id="envelope-scene" role="button" tabindex="0">
                <div class="envelope" id="envelope">
                    <div class="env-back"></div>
                    <div class="env-letter">
                        <span class="mystery">?</span>
                    </div>
                    <div class="env-flap"></div>
                    <div class="env-seal">✦</div>
                </div>
            </div>
            <p class="gift-hint">แตะเพื่อเปิดซองจดหมาย</p>
        </div>
    </section>

    <section id="screen-message" class="screen">
        <div class="message-scene">
            <p class="overline" id="msg-occasion">Surprise!</p>
            <h2 class="message-headline">
                <span id="msg-headline">มีเซอร์ไพรส์</span><br>
                <em id="msg-accent">ที่อยากมอบให้คุณ</em>
            </h2>
            <div class="message-card">
                <p id="msg-body" class="message-body"></p>
                <p class="message-sender">— <span id="msg-sender"></span></p>
            </div>
            <button class="btn-luxury" id="btn-to-gallery">เปิดเซอร์ไพรส์ต่อ</button>
        </div>
    </section>

    <section id="screen-gallery" class="screen">
        <div class="gallery-scene">
            <p class="overline">Hidden Memories</p>
            <h2 class="gallery-title">เซอร์ไพรส์<br><em>ชั้นที่สอง</em></h2>
            <div class="gallery-grid" id="gallery-grid"></div>
            <div class="gallery-nav">
                <button class="btn-luxury" id="btn-prev-photo">←</button>
                <span id="photo-counter">1 / 1</span>
                <button class="btn-luxury" id="btn-next-photo">→</button>
            </div>
            <button class="btn-luxury" id="btn-to-finale" style="margin-top:32px">เปิดเซอร์ไพรส์สุดท้าย</button>
        </div>
    </section>

    <section id="screen-finale" class="screen">
        <div class="finale-scene">
            <div class="finale-sparkle">✦ ✦ ✦</div>
            <h2 class="finale-title">Surprise Complete</h2>
            <p class="finale-sub" id="finale-text"></p>
            <div id="video-container" class="video-container" hidden></div>
            <button class="btn-music" id="btn-music" hidden><span id="music-icon">♪</span> เล่นเพลง</button>
        </div>
    </section>

    <audio id="bg-music" loop></audio>
    <script src="gift-data.js"></script>
    <script src="app.js"></script>
</body>
</html>

name: Deploy demo site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build
        working-directory: frontend
        env:
          VITE_BASE: /Digital_Gift/
        run: |
          npm ci
          npm run build
          cp dist/index.html dist/404.html
          # Phones often keep an old index.html that points at previous hashed bundles.
          # Alias those names to the stable entry so the shared Pages URL keeps working.
          cd dist/assets
          test -f app.js
          test -f app.css
          for f in \
            index-RBMbf1f-.js \
            index-C0w3aByV.js \
            index-2wwFn9kb.js \
            index-D6WYlZVT.js \
            index-TUbyaeRq.css \
            index-57faYRyg.css \
            index-Dbu1_ZTk.css
          do
            case "$f" in
              *.css) cp -f app.css "$f" ;;
              *) cp -f app.js "$f" ;;
            esac
          done
          ls -la

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

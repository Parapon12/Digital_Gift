databases:
  - name: giftlove-db
    plan: free
    databaseName: giftlove
    user: giftlove

services:
  - type: web
    name: giftlove-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: giftlove-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: PORT
        value: "8080"
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: LINE_URL
        sync: false

  - type: web
    name: giftlove-web
    runtime: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
